# Conservative normalization defaults for making logs more comparable without
# erasing the evidence needed for human debugging.
rules:
  - name: ip_address
    enabled: true
    pattern: "\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b"
    replacement: "<IP>"
  - name: uuid
    enabled: true
    pattern: "\\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\\b"
    replacement: "<UUID>"
  - name: hex_value
    enabled: true
    pattern: "\\b0x[0-9a-fA-F]+\\b"
    replacement: "<HEX>"
  - name: duration
    enabled: true
    pattern: "\\b\\d+(?:\\.\\d+)?\\s?(?:ms|s|sec|secs|seconds|m|min|mins|minutes|h|hr|hrs|hours)\\b"
    replacement: "<DURATION>"
  - name: file_path
    enabled: true
    pattern: "(?<!\\w)(?:/[\\w.\\-/]+)"
    replacement: "<PATH>"
  - name: float_value
    enabled: true
    pattern: "(?<![\\w.])[-+]?\\d+\\.\\d+(?![\\w.])"
    replacement: "<FLOAT>"
  - name: long_id
    enabled: true
    pattern: "\\b[A-Za-z0-9][A-Za-z0-9_-]{11,}\\b"
    replacement: "<ID>"
  - name: integer
    enabled: true
    pattern: "(?<![\\w.])[-+]?\\d+(?![\\w.])"
    replacement: "<INT>"
