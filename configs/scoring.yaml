# Heuristic weights for ranking suspicious events and windows. These signals are
# meant to guide review, not to claim diagnosis.
weights:
  rarity: 1.0
  burst: 1.0
  novelty: 1.0

thresholds:
  suspicious_window_score: 0.7
  incident_merge_gap_seconds: 300

windows:
  default_window_seconds: 60
  max_window_seconds: 900
